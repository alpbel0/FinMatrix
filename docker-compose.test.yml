services:
  finmatrix-test-db:
    image: postgres:15-alpine
    container_name: finmatrix-test-db
    environment:
      POSTGRES_USER: finmatrix_test
      POSTGRES_PASSWORD: finmatrix_test
      POSTGRES_DB: finmatrix_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmatrix_test"]
      interval: 5s
      timeout: 5s
      retries: 5