<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Register</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-shell">
    <section class="page-header"><h1>Create Account</h1><p class="muted">Join FinMatrix for BIST analysis.</p></section>
    <form class="card form-stack" id="register-form">
      <input class="input" type="text" id="username" placeholder="Username" required>
      <input class="input" type="email" id="email" placeholder="Email" required>
      <input class="input" type="password" id="password" placeholder="Password" required minlength="6">
      <button class="button" type="submit">Create Account</button>
      <p id="error-message" class="error" style="display: none; color: #dc3545;"></p>
      <a class="muted" href="/login.html">Already have an account?</a>
    </form>
  </div>
  <script type="module" src="/js/register-main.js"></script>
</body>
</html>
