<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Dashboard</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">FinMatrix</div>
      <nav class="nav">
        <a href="/index.html">News</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/chat.html">Chat</a>
      </nav>
      <div class="muted" data-auth-state>Guest</div>
    </header>
    <section class="page-header">
      <h1>Stock Dashboard</h1>
      <div class="search-box">
        <input type="text" id="stock-search" class="input" placeholder="Search symbol (THYAO, GARAN...)" maxlength="10">
        <button id="search-btn" class="button">Go</button>
      </div>
      <div class="card" id="stock-search-results" style="display: none; margin-top: 12px;">
        <div class="card-header">Search Results</div>
        <div class="list" id="stock-search-results-list"></div>
      </div>
    </section>
    <section class="grid" id="dashboard-root">
      <!-- Stock info card -->
      <div class="card" id="stock-info-card">
        <div class="card-header">
          <span class="badge" id="stock-symbol-badge">--</span>
          <span class="muted" id="stock-company-name">Select a stock</span>
        </div>
      </div>
      <!-- Price chart card -->
      <div class="card wide" id="price-chart-card">
        <div class="card-header">Price History</div>
        <div class="chart-area">
          <div class="loading-state" id="chart-loading">Loading chart...</div>
          <canvas id="price-chart" style="display: none;"></canvas>
        </div>
      </div>
      <!-- Metrics cards -->
      <div class="card" id="metrics-placeholder">
        <div class="loading-state">Loading metrics...</div>
      </div>
    </section>
  </div>
  <script type="module" src="/js/dashboard-main.js"></script>
</body>
</html>
