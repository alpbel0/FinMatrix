<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Chat</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .message-user {
      background: var(--color-primary-light);
      margin-left: 2rem;
    }
    .message-assistant {
      background: var(--color-bg);
      margin-right: 2rem;
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .message-content {
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .source-panel {
      background: var(--color-bg);
      border-top: 1px solid var(--color-border);
      padding: 1rem;
    }
    .source-panel h3 {
      margin-bottom: 1rem;
      font-size: 1rem;
    }
    .source-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .source-card {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 1rem;
    }
    .source-header {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .badge-secondary {
      background: var(--color-secondary);
    }
    .source-title {
      font-size: 0.95rem;
      margin: 0.5rem 0;
    }
    .source-preview {
      font-size: 0.85rem;
      color: var(--color-muted);
      margin: 0.5rem 0;
    }
    .source-link {
      font-size: 0.85rem;
    }
    .chat-loading {
      text-align: center;
      padding: 1rem;
      color: var(--color-muted);
    }
    .hidden {
      display: none !important;
    }
    .suggested-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      justify-content: center;
    }
    .suggested-btn {
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      color: var(--color-text);
      cursor: pointer;
      transition: background 0.2s;
    }
    .suggested-btn:hover {
      background: var(--color-primary-light);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">FinMatrix</div>
      <nav class="nav">
        <a href="/index.html">News</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/chat.html" class="active">Chat</a>
      </nav>
      <div class="muted" data-auth-state>Guest</div>
    </header>
    <section class="page-header">
      <h1>AI Chat</h1>
      <p class="muted">BIST hisse senedi raporları hakkında sorularınızı yanıtlıyorum.</p>
    </section>
    <section class="list" id="chat-output"></section>
    <div id="chat-loading" class="chat-loading hidden">
      <p>Analiz ediliyor...</p>
    </div>
    <div id="suggested-questions" class="suggested-questions hidden"></div>
    <section id="source-panel" class="source-panel hidden">
      <h3>Kaynaklar</h3>
      <div id="source-cards" class="source-cards"></div>
    </section>
    <form class="card form-stack" id="chat-form">
      <label for="chat-input">BIST hissesi hakkında soru sorun</label>
      <input class="input" id="chat-input" placeholder="THYAO faaliyet raporu ne diyor?" autocomplete="off">
      <button class="button" type="submit">Gönder</button>
    </form>
  </div>
  <script type="module" src="/js/chat-main.js"></script>
</body>
</html>
