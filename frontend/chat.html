<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Chat</title>
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">FinMatrix</div>
      <nav class="nav">
        <a href="/index.html">News</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/chat.html" class="active">Chat</a>
      </nav>
      <div class="text-muted" data-auth-state style="font-size: var(--font-size-sm);">Guest</div>
    </header>

    <div style="display: grid; grid-template-columns: 1fr 320px; gap: var(--space-6);">
      <!-- Main Chat Area -->
      <div>
        <section class="page-header">
          <h1 class="page-title">AI Chat</h1>
          <p class="page-subtitle">BIST hisse senedi raporları hakkında sorularınızı yanıtlıyorum</p>
        </section>

        <!-- Messages -->
        <div class="card mb-6" style="min-height: 400px;">
          <div id="chat-output" style="display: flex; flex-direction: column; gap: var(--space-4);"></div>
          <div id="chat-loading" class="flex-center" style="padding: var(--space-6); display: none;">
            <div class="spinner" style="margin-right: var(--space-3);"></div>
            <span class="text-muted">Analiz ediliyor...</span>
          </div>
        </div>

        <!-- Suggested Questions -->
        <div id="suggested-questions" class="mb-6" style="display: none;">
          <div class="flex-center" style="gap: var(--space-2); flex-wrap: wrap;">
            <span class="text-muted" style="font-size: var(--font-size-xs); margin-right: var(--space-2);">Önerilen:</span>
          </div>
        </div>

        <!-- Source Panel -->
        <div id="source-panel" class="card mb-6" style="display: none;">
          <div class="card-header">
            <span class="card-title">Kaynaklar</span>
          </div>
          <div id="source-cards" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--space-3);"></div>
        </div>

        <!-- Chat Form -->
        <div class="card">
          <form class="form-stack" id="chat-form">
            <div class="input-group">
              <label class="input-label" for="chat-input">BIST hissesi hakkında soru sorun</label>
              <input class="input" id="chat-input" placeholder="THYAO faaliyet raporu ne diyor?" autocomplete="off">
            </div>
            <button class="btn btn-primary" type="submit">Gönder</button>
          </form>
        </div>
      </div>

      <!-- Chat Sidebar -->
      <div>
        <!-- Quick Actions Widget -->
        <div class="card mb-6">
          <div class="card-header">
            <span class="card-title">Hızlı Sorular</span>
          </div>
          <div style="display: flex; flex-direction: column; gap: var(--space-2);">
            <button class="btn btn-secondary suggested-btn" style="text-align: left;" data-query="THYAO son çeyrek kâr durumu">THYAO son çeyrek kâr</button>
            <button class="btn btn-secondary suggested-btn" style="text-align: left;" data-query="GARAN borç/özkaynak oranı">GARAN borç/özkaynak</button>
            <button class="btn btn-secondary suggested-btn" style="text-align: left;" data-query="ASELS hisse performansı">ASELS performans</button>
            <button class="btn btn-secondary suggested-btn" style="text-align: left;" data-query="BİMAS 2024 faaliyet raporu">BİMAS faaliyet raporu</button>
          </div>
        </div>

        <!-- Sessions Widget -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">Oturumlar</span>
          </div>
          <div id="session-list">
            <div class="text-muted" style="font-size: var(--font-size-sm); text-align: center; padding: var(--space-4);">
              Yeni oturum başlatın
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/js/chat-main.js"></script>
</body>
</html>
