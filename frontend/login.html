<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Login</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">
    <section class="page-header"><h1>Login</h1><p class="muted">Sign in to your account.</p></section>
    <form class="card form-stack" id="login-form">
      <input class="input" type="email" id="email" placeholder="Email" required>
      <input class="input" type="password" id="password" placeholder="Password" required minlength="6">
      <button class="button" type="submit">Login</button>
      <p id="error-message" class="error" style="display: none; color: #dc3545;"></p>
      <a class="muted" href="register.html">Create an account</a>
    </form>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-message");

      try {
        await window.FinMatrixAuth.loginUser(email, password);
        window.location.href = "dashboard.html";
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
