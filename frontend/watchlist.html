<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinMatrix - Watchlist</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">FinMatrix</div>
      <nav class="nav">
        <a href="/index.html">News</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/watchlist.html">Watchlist</a>
        <a href="/chat.html">Chat</a>
      </nav>
      <div class="muted" data-auth-state>Guest</div>
    </header>
    <section class="page-header">
      <h1>Watchlist</h1>
      <p class="muted">Track your stocks and manage notification preferences.</p>
    </section>
    <section class="card">
      <form id="watchlist-form">
        <label for="watchlist-symbol" class="muted">Add stock by symbol</label>
        <div class="form-row">
          <input id="watchlist-symbol" name="symbol" type="text" placeholder="THYAO" autocomplete="off" required>
          <button class="button primary" type="submit">Add</button>
        </div>
        <p class="muted" id="watchlist-feedback" aria-live="polite"></p>
      </form>
    </section>
    <section class="grid three" id="watchlist-root"></section>
  </div>
  <script type="module" src="/js/watchlist-main.js"></script>
</body>
</html>
